mutation Login($input: LoginInput!) {
  login(input: $input) {
    accessToken
    user {
      id
      name
      email
      role
      status
    }
  }
}

mutation Register($input: RegisterInput!) {
  register(input: $input) {
    accessToken
    user {
      id
      name
      email
      role
      status
    }
  }
}

query Me {
  me {
    id
    name
    email
    role
    status
  }
}
